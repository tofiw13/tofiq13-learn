<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizimlə Əlaqə</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Bizimlə Əlaqə</h1>
        <nav>
            <a href="index.html"><i class="fa fa-home"></i> Ana Səhifə</a>
             <button class="theme-toggle"> 
              <i class="fa-solid fa-moon"></i>
            </button>
        </nav>
    </header>

    <main>
        <section class="contact-form">
            <h2>Mesaj göndərin</h2>

            <form id="my-form" action="/api/contact" method="POST">
                <label for="name">Adınız</label>
                <input id="name" name="name" type="text" placeholder="Adınız" required />

                <label for="email">E-poçt</label>
                <input id="email" name="email" type="email" placeholder="email@misal.com" required />

                <label for="message">Mesaj</label>
                <textarea id="message" name="message" placeholder="Mesajınızı yazın" rows="6" required></textarea>

                <button type="submit">Göndər</button>
            </form>

            <p id="my-form-status"></p>

            <hr style="margin:20px 0;" />

            <h3>Yazılan mesajlar (admin)</h3>
            <button id="loadMessages">Yazılanları göstər</button>
            <div id="messagesList" style="margin-top:12px;"></div>
        </section>
    </main>

    <footer>
        <p><a href="index.html">◀ Ana Səhifə</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
